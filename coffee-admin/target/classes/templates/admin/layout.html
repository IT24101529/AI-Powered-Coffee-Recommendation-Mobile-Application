<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content, activeTab)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — Coffee Admin'">Coffee Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="app-layout">

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <span class="brand-icon">☕</span>
        <div>
            <div class="brand-name">Coffee Admin</div>
            <div class="brand-sub">Analytics Dashboard</div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <a th:href="@{/admin/dashboard}" class="nav-item" th:classappend="${activeTab=='dashboard'} ? 'active' : ''">
            <span class="nav-icon">📊</span>
            <span>Dashboard</span>
        </a>
        <a th:href="@{/admin/trends}" class="nav-item" th:classappend="${activeTab=='trends'} ? 'active' : ''">
            <span class="nav-icon">📈</span>
            <span>Trend Analysis</span>
        </a>
        <a th:href="@{/admin/products}" class="nav-item" th:classappend="${activeTab=='products'} ? 'active' : ''">
            <span class="nav-icon">🛍️</span>
            <span>Products</span>
        </a>
        <a th:href="@{/admin/chatbot}" class="nav-item" th:classappend="${activeTab=='chatbot'} ? 'active' : ''">
            <span class="nav-icon">🤖</span>
            <span>Analytics Chatbot</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">🚪 Sign Out</button>
        </form>
    </div>
</aside>

<!-- Main content -->
<main class="main-content">
    <header class="topbar">
        <div>
            <h1 class="page-title" th:text="${title}">Dashboard</h1>
        </div>
        <div class="topbar-right">
            <span class="admin-badge">👤 Admin</span>
        </div>
    </header>

    <div class="content-area" th:replace="${content}">
        <!-- page content injected here -->
    </div>
</main>

</body>
</html>
