# ─────────────────────────────────────────
#  Coffee Admin – Application Properties
# ─────────────────────────────────────────

# Server
server.port=8080
server.servlet.context-path=/

# ── PostgreSQL ──────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/coffee_admin_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Thymeleaf ───────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Admin credentials (change in production!) ──
app.admin.username=admin
app.admin.password=admin123
app.admin.email=admin@coffeedash.com

# ── CSV Data Import paths ───────────────
app.csv.sales=src/main/resources/data/201904_sales_reciepts.csv
app.csv.product=src/main/resources/data/product.csv
app.csv.customer=src/main/resources/data/customer.csv
app.csv.sales-outlet=src/main/resources/data/sales_outlet.csv
app.csv.staff=src/main/resources/data/staff.csv
app.csv.targets=src/main/resources/data/sales_targets.csv
app.csv.pastry=src/main/resources/data/pastry_inventory.csv
app.csv.dates=src/main/resources/data/Dates.csv
app.csv.generations=src/main/resources/data/generations.csv

# ── Logging ─────────────────────────────
logging.level.com.coffee=INFO
logging.level.org.springframework.security=WARN
